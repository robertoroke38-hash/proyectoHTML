<!DOCTYPE html>
<html>
    <link rel="stylesheet" href="calculadoraStyle.css">
<body>
    <h2>Calculadora</h2>
    <div class="coca">
    <input type="number" id="numero1" placeholder="Numero 1">
    <input type="number" id="numero2" placeholder="Numero 2">
    <button onclick="sumar()">+</button>
    <button onclick="restar()">-</button>
    <button onclick="multiplicar()">x</button>
    <button onclick="dividir()">/</button>
    <p id="resultado"></p>
    </div>
    <script>
        function sumar(){
            let num1 = parseFloat(document.getElementById("numero1").value);
            let num2 = parseFloat(document.getElementById("numero2").value);

            document.getElementById("resultado").textContent = "Resultado: " + (num1 + num2);
        }
        function restar(){
            let num1 = parseFloat(document.getElementById("numero1").value);
            let num2 = parseFloat(document.getElementById("numero2").value);

            document.getElementById("resultado").textContent = "Resultado: " + (num1 - num2);
        }
        function multiplicar(){
            let num1 = parseFloat(document.getElementById("numero1").value);
            let num2 = parseFloat(document.getElementById("numero2").value);

            document.getElementById("resultado").textContent = "Resultado: " + (num1 * num2);
        }
        function dividir(){
            let num1 = parseFloat(document.getElementById("numero1").value);
            let num2 = parseFloat(document.getElementById("numero2").value);

            document.getElementById("resultado").textContent = "Resultado: " + (num1 / num2);
        }
    
    </script>
</body>
</html>
